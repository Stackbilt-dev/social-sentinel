name = "social-sentinel"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[triggers]
crons = ["*/15 * * * *"]

[vars]
# Set this to your own ingestion/metrics endpoint URL
AIDOCTOR_URL = "https://your-ingestion-endpoint.example.com"

[[kv_namespaces]]
binding = "TENANT_CONFIG"
# Create a KV namespace with: wrangler kv:namespace create TENANT_CONFIG
# Then replace this placeholder with the returned namespace ID
id = "placeholder-create-with-wrangler"

[ai]
binding = "AI"
