name = "social-sentinel"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[triggers]
crons = ["*/15 * * * *"]

[vars]
# Set this to your downstream ingestion endpoint URL
INGEST_ENDPOINT_URL = "https://your-ingestion-endpoint.example.com"

[[kv_namespaces]]
binding = "TENANT_CONFIG"
# Create a KV namespace with: wrangler kv:namespace create TENANT_CONFIG
# Then replace this placeholder with the returned namespace ID
id = "placeholder-create-with-wrangler"

[[d1_databases]]
binding = "DB"
database_name = "social-sentinel"
# Create with: wrangler d1 create social-sentinel
# Then replace with the returned database ID
database_id = "placeholder-create-with-wrangler"

[ai]
binding = "AI"
